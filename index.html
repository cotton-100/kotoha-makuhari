<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f4ebdd;
    --bg-card: #fbf6ec;
    --ink: #2a1f17;
    --ink-soft: #6e5a48;
    --ink-faint: #9c8676;

    --gold: #b08550;

    --line-strong: rgba(42, 31, 23, 0.3);
  }

  html, body { background: var(--bg); }

  body {
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    line-height: 1.85;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 28px 80px;
  }

  /* ---------- 画像の保護対策 ---------- */
  img {
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* ---------- HERO ---------- */
  .hero {
    text-align: center;
    padding: 24px 0 56px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'Shippori Mincho B1', serif;

    margin-bottom: 22px;
    text-indent: 0.55em;
  }

  .hero h1 {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 52px;
    letter-spacing: 0.06em;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .hero-romaji {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.45em;
    color: var(--ink-faint);
    margin-bottom: 32px;
    text-indent: 0.45em;
  }

  .hero-tagline {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    line-height: 1.7;
  }

  .hero-meta {
    margin-top: 28px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
  }

  .hero-meta .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
  }

  /* ---------- SECTIONS ---------- */
  section {
    padding: 64px 0;
    border-bottom: 1px solid var(--line);
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 32px;
  }

  .section-num {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--gold);
  }

  .section-head h2 {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }

  .section-head .rule {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .section-head .ja {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
  }

  /* ---------- ABOUT ---------- */
  .about-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 44px;
    align-items: start;
  }

  .about-text p {
    font-size: 15.5px;
    line-height: 2.05;
    color: var(--ink);
    margin-bottom: 20px;
  }
