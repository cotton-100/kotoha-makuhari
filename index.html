<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幕張ことは | アニメ大好きVTuber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f4ebdd;
    --bg-card: #fbf6ec;
    --ink: #2a1f17;
    --ink-soft: #6e5a48;
    --ink-faint: #9c8676;
    --accent: #c97070;
    --accent-deep: #a04545;
    --gold: #b08550;
    --line: rgba(42, 31, 23, 0.14);
    --line-strong: rgba(42, 31, 23, 0.3);
  }

  html, body { background: var(--bg); }

  body {
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    line-height: 1.85;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 28px 80px;
  }

  /* ---------- 画像の保護対策 ---------- */
  img {
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* ---------- HERO ---------- */
  .hero {
    text-align: center;
    padding: 24px 0 56px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.55em;
    color: var(--gold);
    margin-bottom: 22px;
    text-indent: 0.55em;
  }

  .hero h1 {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 52px;
    letter-spacing: 0.06em;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .hero-romaji {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.45em;
    color: var(--ink-faint);
    margin-bottom: 32px;
    text-indent: 0.45em;
  }

  .hero-tagline {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    line-height: 1.7;
  }

  .hero-meta {
    margin-top: 28px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
  }

  .hero-meta .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
  }

  /* ---------- SECTIONS ---------- */
  section {
    padding: 64px 0;
    border-bottom: 1px solid var(--line);
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 32px;
  }

  .section-num {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--gold);
  }

  .section-head h2 {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }

  .section-head .rule {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .section-head .ja {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
  }

  /* ---------- ABOUT ---------- */
  .about-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 44px;
    align-items: start;
  }

  .about-text p {
    font-size: 15.5px;
    line-height: 2.05;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .about-text p:last-child { margin-bottom: 0; }

  .about-portrait {
    border: 1px solid var(--line);
    overflow: hidden;
    background: var(--bg-card);
  }

  .about-portrait img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ---------- STATS ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-top: 44px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .stat {
    text-align: center;
    padding: 24px 12px;
    border-right: 1px solid var(--line);
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink);
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .stat-num .unit {
    font-size: 14px;
    font-weight: 500;
    margin-left: 2px;
    color: var(--ink-soft);
  }

  .stat-label {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
  }

  /* ---------- TAGS ---------- */
  .specialty-intro {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .specialty-hint {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 22px;
  }

  .tag-group {
    margin-bottom: 24px;
  }

  .tag-group:last-child { margin-bottom: 0; }

  .tag-label {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
  }

  .tag {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    letter-spacing: 0.06em;
    transition: all 0.25s ease;
    text-decoration: none;
    display: inline-block;
    cursor: default; /* ← ここを pointer から default に変更しました */
    position: relative;
  }

  .tag:hover {
    border-color: var(--accent);
    color: var(--accent-deep);
    transform: translateY(-1px);
  }

  /* ---------- HIGHLIGHTS (videos) ---------- */
  .highlights-intro {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }

  .video-grid {
    display: grid;
    gap: 28px;
  }

  .video-item {
    position: relative;
  }

  .video-num {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 12px;
    text-indent: 0.3em;
  }

  .video-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 1px solid var(--line);
    background: var(--bg-card);
    overflow: hidden;
  }

  .video-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* ---------- LINKS ---------- */
  .links {
    display: grid;
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 24px 28px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    transition: all 0.3s ease;
    position: relative;
  }

  .link-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .link-card .icon {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 22px;
    width: 32px;
    text-align: center;
    color: var(--accent);
    font-weight: 600;
  }

  .link-card .info { flex: 1; }

  .link-card .title {
    display: block;
    font-family: 'Shippori Mincho B1', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .link-card .handle {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }

  .link-card .arrow {
    font-size: 14px;
    color: var(--ink-soft);
    transition: transform 0.3s ease;
  }

  .link-card:hover .arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  /* ---------- INQUIRY FORM ---------- */
  .inquiry-box {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 36px 32px;
    text-align: center;
  }

  .inquiry-box .lead {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 12px;
    letter-spacing: 0.08em;
  }

  .inquiry-box p {
    font-size: 13.5px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.95;
  }

  /* ボタンのスタイル（Googleフォームへのリンク用に調整） */
  .inquiry-btn {
    display: inline-block;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
    font-family: 'Shippori Mincho B1', serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.25em;
    padding: 16px 44px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    text-indent: 0.25em;
    margin-top: 8px;
    text-decoration: none;
    text-align: center;
  }

  .inquiry-btn:hover {
    background: var(--accent-deep);
    transform: translateY(-1px);
  }

  .inquiry-note {
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
  }

  /* ---------- FOOTER ---------- */
  footer {
    text-align: center;
    padding: 48px 0 0;
  }

  footer .mark {
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 16px;
    opacity: 0.7;
  }

  footer .name {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  footer .copy {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
  }

  /* ---------- HASHTAGS ---------- */
  .hashtags {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .hashtags span {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 700px) {
    .wrap { padding: 44px 22px 64px; }
    .hero { padding: 24px 0 50px; }
    .hero h1 { font-size: 38px; letter-spacing: 0.04em; }
    .hero-romaji { font-size: 1
